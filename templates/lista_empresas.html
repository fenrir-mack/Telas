<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocuIA - Empresas</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="{{ url_for('static', filename='js/auth-guard.js') }}"></script>
    <script src="{{ url_for('static', filename='js/api.js') }}"></script>
</head>

<body class="dashboard-body">

<aside class="sidebar">
    <div class="sidebar-logo">
        <h2>DocuIA</h2>
        <p>Documentação Inteligente</p>
    </div>

    <nav class="menu">
        <a href="/dashboard">
            <img src="{{ url_for('static', filename='pngs/dashboard.png') }}" alt="Dashboard" style="width:18px; height:18px; vertical-align:text-bottom; filter: grayscale(100%) opacity(0.6);"> <span>Dashboard</span>
        </a>
        <a class="active" href="/empresas">
            <img src="{{ url_for('static', filename='pngs/business-and-trade.png') }}" alt="Empresas" style="width:18px; height:18px; vertical-align:text-bottom; filter: brightness(0) invert(1);"> <span>Empresas</span>
        </a>
        <a href="/projetos">
            <img src="{{ url_for('static', filename='pngs/folder.png') }}" alt="Projetos" style="width:18px; height:18px; vertical-align:text-bottom; filter: grayscale(100%) opacity(0.6);"> <span>Projetos</span>
        </a>
    </nav>

    <div class="sidebar-bottom">


        <div class="user-dropdown-area">
            <div class="user-menu" id="userMenu">
                <a href="/perfil">♙ Meu Perfil</a>


                <div class="menu-divider"></div>

                <a href="/login" class="logout-link">↪ Sair</a>
            </div>

            <button class="user-box user-toggle" onclick="toggleUserMenu()">
                <div class="profile-mini-avatar">U</div>

                <div class="user-info">
                    <strong id="sidebar-user-name">Usuário</strong>
                    <p id="sidebar-user-email">email@exemplo.com</p>
                </div>

                <span class="dropdown-arrow">⌄</span>
            </button>
        </div>
    </div>
</aside>

<main class="dashboard-main">

    <section class="companies-content">

        <header class="companies-header">
            <div>
                <h1>Minhas Empresas</h1>
                <p>Gerencie suas organizações e empresas</p>
            </div>

            <button class="new-company-btn" id="btn-nova-empresa">
                + Nova Empresa
            </button>
        </header>

        <div class="company-search">
            <span>⌕</span>
            <input type="text" placeholder="Buscar empresas...">
        </div>

        <section class="companies-grid" id="companies-grid">
            <!-- Empresas serão carregadas aqui via JS -->
            <p style="padding: 20px; grid-column: 1/-1; text-align: center; color: #666;">Carregando empresas...</p>
        </section>

    </section>

</main>

<div class="help-btn">?</div>

<script>
async function loadCompanies() {
    try {
        // 1. Carregar Perfil (Sidebar)
        const userResp = await fetch(API_URLS.auth + "/perfil/me", { headers: authHeaders() });
        const user = await handleResponse(userResp);
        document.getElementById('sidebar-user-name').innerText = user.nome;
        document.getElementById('sidebar-user-email').innerText = user.email;

        // 2. Carregar Empresas
        const resp = await fetch(API_URLS.empresas + "/empresas", { headers: authHeaders() });
        const companies = await handleResponse(resp);
        renderCompanies(companies);

    } catch (error) {
        console.error("Erro ao carregar empresas:", error);
    }
}

function renderCompanies(companies) {
    const grid = document.getElementById('companies-grid');
    if (companies.length === 0) {
        grid.innerHTML = '<p style="padding: 40px; grid-column: 1/-1; text-align: center; color: #666;">Você ainda não participa de nenhuma empresa.</p>';
        return;
    }

    const colors = ['purple', 'green', 'red-orange', 'blue'];

    grid.innerHTML = companies.map((c, index) => `
        <article class="company-card" onclick="window.location.href='/empresa?id=${c.id}'" style="cursor: pointer;">
            <div class="company-card-top">
                <div class="company-big-icon ${colors[index % colors.length]}">▤</div>
                <span class="dots">⋮</span>
            </div>
            <h2>${c.nome}</h2>
            <div class="badges">
                ${c.dono_id === parseInt(localStorage.getItem('user_id')) ? '<span class="badge owner">♕ Proprietário</span>' : '<span class="badge">Membro</span>'}
            </div>
            <div class="company-card-footer">
                <span><img src="/static/pngs/users.png" style="width:14px; height:14px; vertical-align:text-bottom; filter: grayscale(100%) opacity(0.6);"> Membros</span>
                <span><img src="/static/pngs/folder.png" style="width:14px; height:14px; vertical-align:text-bottom; filter: grayscale(100%) opacity(0.6);"> Projetos</span>
            </div>
        </article>
    `).join('');
}

// Criar Nova Empresa
document.getElementById('btn-nova-empresa').addEventListener('click', async () => {
    const nome = prompt("Digite o nome da nova empresa:");
    if (!nome) return;

    const descricao = prompt("Digite uma breve descrição:");

    try {
        const resp = await fetch(API_URLS.empresas + "/empresas", {
            method: "POST",
            headers: authHeaders(),
            body: JSON.stringify({ nome, descricao })
        });
        await handleResponse(resp);
        alert("Empresa criada com sucesso!");
        loadCompanies();
    } catch (error) {
        alert(error.message);
    }
});

document.addEventListener('DOMContentLoaded', loadCompanies);

// Toggle menu logic
function toggleUserMenu() {
    const menu = document.getElementById("userMenu");
    menu.classList.toggle("show");
}
window.addEventListener("click", function(e) {
    const menu = document.getElementById("userMenu");
    const button = document.querySelector(".user-toggle");
    if (menu && !menu.contains(e.target) && button && !button.contains(e.target)) {
        menu.classList.remove("show");
    }
});
</script>

</body>
</html>
