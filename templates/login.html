<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>DocuIA - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<main class="page login-page">

    <header class="logo login-logo">
        <h1>DocuIA</h1>
        <p>Documentação Inteligente com IA</p>
    </header>

    <section class="card login-card">
        <h2>Bem-vindo de volta</h2>
        <p class="subtitle">Entre com suas credenciais para continuar</p>

        <form method="POST">
            <div class="form-group">
                <label>E-mail</label>
                <div class="input-box">
                    <span class="icon">✉</span>
                    <input type="email" placeholder="seu@email.com">
                </div>
            </div>

            <div class="form-group">
                <label>Senha</label>
                <div class="input-box">
                    <span class="icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle;"><circle cx="7.5" cy="15.5" r="5.5"/><path d="m21 2-9.6 9.6"/><path d="m15.5 7.5 3 3L22 7l-3-3"/></svg>
                    </span>
                    <input type="password" placeholder="Sua senha">
                </div>
            </div>

            <div class="options">
                <label class="check-label">
                    <input type="checkbox">
                    Lembrar-me
                </label>

                <a href="/esqueceu-senha">Esqueceu a senha?</a>
            </div>

            <button type="submit">
                <span>↪</span>
                Entrar
            </button>
        </form>

        <p class="bottom-text">
            Não tem uma conta? <a href="/cadastro">Criar conta</a>
        </p>
    </section>

    <footer>© 2026 DocuIA. Todos os direitos reservados.</footer>

</main>

</body>
</html>
